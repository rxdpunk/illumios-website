<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Illumios waitlist workflow flow</title>
  <desc id="desc">A simple diagram showing website waitlist submission flowing into a GHL inbound webhook workflow, then contact creation, tagging, and notification.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fc; }
      .title { font: 700 28px Nunito, Arial, sans-serif; fill: #0D1B4B; }
      .sub { font: 400 16px Nunito, Arial, sans-serif; fill: #334155; }
      .box-title { font: 700 22px Nunito, Arial, sans-serif; fill: #0D1B4B; }
      .box-copy { font: 400 15px Nunito, Arial, sans-serif; fill: #334155; }
      .box { fill: #ffffff; stroke: #d9dfef; stroke-width: 2; rx: 20; }
      .box-accent { fill: #fff6f1; stroke: #F26522; stroke-width: 3; rx: 20; }
      .arrow { stroke: #F26522; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .pill { fill: #0D1B4B; }
      .pill-text { font: 700 13px Nunito, Arial, sans-serif; fill: #ffffff; letter-spacing: 0.08em; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#F26522" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="420" rx="24" />
  <text class="title" x="56" y="58">Illumios Website Waitlist Capture</text>
  <text class="sub" x="56" y="88">This is the setup you are building inside GoHighLevel.</text>

  <rect class="pill" x="72" y="128" width="120" height="28" rx="14" />
  <text class="pill-text" x="96" y="147">WEBSITE</text>
  <rect class="box" x="56" y="160" width="250" height="170" rx="20" />
  <text class="box-title" x="80" y="202">Waitlist Form</text>
  <text class="box-copy" x="80" y="232">The site sends:</text>
  <text class="box-copy" x="80" y="258">first_name, email, phone</text>
  <text class="box-copy" x="80" y="282">event_name=website_waitlist_joined</text>
  <text class="box-copy" x="80" y="306">capture_mode=waitlist</text>

  <rect class="pill" x="386" y="128" width="120" height="28" rx="14" />
  <text class="pill-text" x="403" y="147">TRIGGER</text>
  <rect class="box-accent" x="370" y="160" width="250" height="170" rx="20" />
  <text class="box-title" x="394" y="202">Inbound Webhook</text>
  <text class="box-copy" x="394" y="232">Create the workflow from scratch.</text>
  <text class="box-copy" x="394" y="258">Add an Inbound Webhook trigger.</text>
  <text class="box-copy" x="394" y="282">Save it and copy the generated URL.</text>

  <rect class="pill" x="700" y="128" width="120" height="28" rx="14" />
  <text class="pill-text" x="712" y="147">ACTIONS</text>
  <rect class="box" x="684" y="160" width="250" height="170" rx="20" />
  <text class="box-title" x="708" y="202">Contact Actions</text>
  <text class="box-copy" x="708" y="232">1. Create/Update Contact</text>
  <text class="box-copy" x="708" y="258">Map first_name, email, phone</text>
  <text class="box-copy" x="708" y="282">2. Add tags for founding cohort</text>

  <rect class="pill" x="1014" y="128" width="130" height="28" rx="14" />
  <text class="pill-text" x="1030" y="147">RESULT</text>
  <rect class="box" x="998" y="160" width="150" height="170" rx="20" />
  <text class="box-title" x="1022" y="202">Done</text>
  <text class="box-copy" x="1022" y="232">Workflow published</text>
  <text class="box-copy" x="1022" y="258">Webhook URL copied</text>
  <text class="box-copy" x="1022" y="282">Ready to wire in Vercel</text>

  <path class="arrow" d="M 306 245 C 332 245, 344 245, 370 245" marker-end="url(#arrowhead)" />
  <path class="arrow" d="M 620 245 C 646 245, 658 245, 684 245" marker-end="url(#arrowhead)" />
  <path class="arrow" d="M 934 245 C 960 245, 972 245, 998 245" marker-end="url(#arrowhead)" />
</svg>
